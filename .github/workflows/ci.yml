name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  core-cli:
    name: Core/CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore core/CLI projects
        run: |
          dotnet restore src/StegoForge.Core/StegoForge.Core.csproj
          dotnet restore src/StegoForge.Application/StegoForge.Application.csproj
          dotnet restore src/StegoForge.Cli/StegoForge.Cli.csproj
          dotnet restore tests/StegoForge.Tests.Unit/StegoForge.Tests.Unit.csproj
          dotnet restore tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj
          dotnet restore tests/StegoForge.Tests.Cli/StegoForge.Tests.Cli.csproj

      - name: Build core/CLI projects
        run: |
          dotnet build src/StegoForge.Core/StegoForge.Core.csproj --configuration Release --no-restore
          dotnet build src/StegoForge.Application/StegoForge.Application.csproj --configuration Release --no-restore
          dotnet build src/StegoForge.Cli/StegoForge.Cli.csproj --configuration Release --no-restore
          dotnet build tests/StegoForge.Tests.Unit/StegoForge.Tests.Unit.csproj --configuration Release --no-restore
          dotnet build tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-restore
          dotnet build tests/StegoForge.Tests.Cli/StegoForge.Tests.Cli.csproj --configuration Release --no-restore

      - name: Test core/CLI projects
        run: |
          dotnet test tests/StegoForge.Tests.Unit/StegoForge.Tests.Unit.csproj --configuration Release --no-build --logger "trx;LogFileName=unit.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --logger "trx;LogFileName=integration.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Cli/StegoForge.Tests.Cli.csproj --configuration Release --no-build --logger "trx;LogFileName=cli.trx" --results-directory TestResults

      - name: Hardening suite (bounded; PR/push)
        if: github.event_name != 'schedule'
        env:
          STEGOFORGE_HARDENING_ARTIFACTS_DIR: TestResults/hardening-repros
        run: |
          dotnet test tests/StegoForge.Tests.Unit/StegoForge.Tests.Unit.csproj --configuration Release --no-build --filter "Category=Hardening&Campaign!=Fuzz-Full" --logger "trx;LogFileName=hardening-unit-bounded.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter "Category=Hardening&Campaign!=Fuzz-Full" --logger "trx;LogFileName=hardening-integration-bounded.trx" --results-directory TestResults

      - name: Hardening suite (full fuzz campaigns; nightly/scheduled)
        if: github.event_name == 'schedule'
        env:
          STEGOFORGE_HARDENING_ARTIFACTS_DIR: TestResults/hardening-repros
        run: |
          dotnet test tests/StegoForge.Tests.Unit/StegoForge.Tests.Unit.csproj --configuration Release --no-build --filter "Category=Hardening&Campaign=Fuzz-Full" --logger "trx;LogFileName=hardening-unit-full.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter "Category=Hardening&Campaign=Fuzz-Full" --logger "trx;LogFileName=hardening-integration-full.trx" --results-directory TestResults

      - name: PNG/BMP v1 acceptance smoke filter (PR)
        if: github.event_name == 'pull_request'
        run: |
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter FullyQualifiedName~PngRoundTripIntegrationTests --logger "trx;LogFileName=png-roundtrip.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter FullyQualifiedName~CapacityServiceIntegrationTests --logger "trx;LogFileName=png-capacity.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter FullyQualifiedName~BmpRoundTripIntegrationTests --logger "trx;LogFileName=bmp-roundtrip.trx" --results-directory TestResults
          dotnet test tests/StegoForge.Tests.Integration/StegoForge.Tests.Integration.csproj --configuration Release --no-build --filter FullyQualifiedName~BmpCapacityServiceIntegrationTests --logger "trx;LogFileName=bmp-capacity.trx" --results-directory TestResults

      - name: Upload core/CLI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core-cli-${{ matrix.os }}
          path: |
            TestResults/*.trx
            TestResults/hardening-repros/*
          if-no-files-found: warn

  wpf:
    name: WPF (windows-latest)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore WPF projects
        run: |
          dotnet restore src/StegoForge.Wpf/StegoForge.Wpf.csproj
          dotnet restore tests/StegoForge.Tests.Wpf/StegoForge.Tests.Wpf.csproj

      - name: Build WPF projects
        run: |
          dotnet build src/StegoForge.Wpf/StegoForge.Wpf.csproj --configuration Release --no-restore
          dotnet build tests/StegoForge.Tests.Wpf/StegoForge.Tests.Wpf.csproj --configuration Release --no-restore

      - name: Test WPF smoke project
        run: dotnet test tests/StegoForge.Tests.Wpf/StegoForge.Tests.Wpf.csproj --configuration Release --no-build --logger "trx;LogFileName=wpf-smoke.trx" --results-directory TestResults

      - name: Test WPF command-flow subset
        run: dotnet test tests/StegoForge.Tests.Wpf/StegoForge.Tests.Wpf.csproj --configuration Release --no-build --filter "FullyQualifiedName~WpfCommandFlowTests" --logger "trx;LogFileName=wpf-command-flow.trx" --results-directory TestResults

      - name: Test WPF hardening subset (Windows)
        if: github.event_name != 'schedule'
        env:
          STEGOFORGE_HARDENING_ARTIFACTS_DIR: TestResults/hardening-repros
        run: dotnet test tests/StegoForge.Tests.Wpf/StegoForge.Tests.Wpf.csproj --configuration Release --no-build --filter "Category=Hardening" --logger "trx;LogFileName=wpf-hardening.trx" --results-directory TestResults

      - name: Upload WPF test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-wpf-windows-latest
          path: |
            TestResults/*.trx
            TestResults/hardening-repros/*
          if-no-files-found: warn
