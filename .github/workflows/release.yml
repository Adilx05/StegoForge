name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in format vX.Y.Z'
        required: true
        type: string
      version:
        description: 'Release version in format X.Y.Z'
        required: true
        type: string
      changelog_summary:
        description: 'Short summary aligned with CHANGELOG entry'
        required: true
        type: string

permissions:
  contents: read
  checks: read

jobs:
  validate-release-metadata:
    name: Validate Release Metadata
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag/version/changelog metadata
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANGELOG_SUMMARY: ${{ inputs.changelog_summary }}
        run: |
          set -euo pipefail

          tag="$INPUT_TAG"
          version="$INPUT_VERSION"
          summary="$INPUT_CHANGELOG_SUMMARY"

          if [[ -z "$tag" || -z "$version" || -z "$summary" ]]; then
            echo "tag, version, and changelog_summary are required."
            exit 1
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z (received: $tag)."
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z (received: $version)."
            exit 1
          fi

          expected_tag="v$version"
          if [[ "$tag" != "$expected_tag" ]]; then
            echo "Tag/version mismatch: expected $expected_tag from version $version, received $tag."
            exit 1
          fi

          if ! rg -n "^## \[$version\]" CHANGELOG.md > /dev/null; then
            echo "CHANGELOG.md is missing heading for version $version."
            exit 1
          fi

      - name: Capture outputs
        id: capture
        run: echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"


  verify-ci-status-checks:
    name: Verify Required CI Status Checks
    runs-on: ubuntu-latest
    needs: validate-release-metadata

    steps:
      - name: Validate required CI checks succeeded for target commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const requestedTag = '${{ inputs.tag }}';

            let sha = context.sha;

            if (requestedTag) {
              const tagRef = await github.rest.git.getRef({ owner, repo, ref: `tags/${requestedTag}` });
              let objectSha = tagRef.data.object.sha;
              if (tagRef.data.object.type === 'tag') {
                const tagObject = await github.rest.git.getTag({ owner, repo, tag_sha: objectSha });
                objectSha = tagObject.data.object.sha;
              }
              sha = objectSha;
            }

            const response = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha,
              per_page: 100
            });

            const requiredCheckRuns = [
              'Core/CLI (ubuntu-latest)',
              'Core/CLI (windows-latest)',
              'WPF (windows-latest)'
            ];

            const checksByName = new Map(response.data.check_runs.map(run => [run.name, run]));
            const failures = [];

            for (const checkName of requiredCheckRuns) {
              const check = checksByName.get(checkName);
              if (!check) {
                failures.push(`Missing required status check: ${checkName}`);
                continue;
              }

              if (check.status !== 'completed') {
                failures.push(`Status check not completed: ${checkName} (status=${check.status})`);
                continue;
              }

              if (check.conclusion !== 'success') {
                failures.push(`Status check not successful: ${checkName} (conclusion=${check.conclusion})`);
              }
            }

            if (failures.length > 0) {
              core.setFailed([
                `Required CI status checks are not all successful for commit ${sha}.`,
                ...failures
              ].join('\n'));
            } else {
              core.info(`Required CI status checks succeeded for commit ${sha}.`);
            }

  package-cli:
    name: Package CLI
    runs-on: ubuntu-latest
    needs: [validate-release-metadata, verify-ci-status-checks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Publish CLI
        run: dotnet publish src/StegoForge.Cli/StegoForge.Cli.csproj --configuration Release --output artifacts/cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: stegoforge-cli-${{ needs.validate-release-metadata.outputs.tag }}
          path: artifacts/cli

  package-wpf:
    name: Package WPF
    runs-on: windows-latest
    needs: [validate-release-metadata, verify-ci-status-checks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Publish WPF
        run: dotnet publish src/StegoForge.Wpf/StegoForge.Wpf.csproj --configuration Release --output artifacts/wpf

      - name: Upload WPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: stegoforge-wpf-${{ needs.validate-release-metadata.outputs.tag }}
          path: artifacts/wpf
